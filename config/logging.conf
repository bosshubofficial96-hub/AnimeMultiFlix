#
# AnimeMultiFlix - Logging Configuration
# Version: 4.0.0 (2026)
# Error Free - Production Ready
# Powered by BossHub
#

[loggers]
keys=root,app,access,error,database,api,websocket,voice,payment,auth,security,admin,group,chat,streaming

[handlers]
keys=console,file_app,file_error,file_access,file_database,file_api,file_websocket,file_voice,file_payment,file_auth,file_security,file_admin,rotating_app,rotating_error,rotating_access,sentry

[formatters]
keys=default,detailed,json,simple,access,custom

# ==================== LOGGERS ====================

[logger_root]
level=INFO
handlers=console

[logger_app]
level=DEBUG
handlers=console,rotating_app
qualname=app
propagate=0

[logger_access]
level=INFO
handlers=console,rotating_access
qualname=access
propagate=0

[logger_error]
level=ERROR
handlers=console,rotating_error,sentry
qualname=error
propagate=0

[logger_database]
level=INFO
handlers=console,file_database
qualname=database
propagate=0

[logger_api]
level=INFO
handlers=console,file_api
qualname=api
propagate=0

[logger_websocket]
level=INFO
handlers=console,file_websocket
qualname=websocket
propagate=0

[logger_voice]
level=INFO
handlers=console,file_voice
qualname=voice
propagate=0

[logger_payment]
level=INFO
handlers=console,file_payment
qualname=payment
propagate=0

[logger_auth]
level=INFO
handlers=console,file_auth
qualname=auth
propagate=0

[logger_security]
level=WARNING
handlers=console,file_security,sentry
qualname=security
propagate=0

[logger_admin]
level=INFO
handlers=console,file_admin
qualname=admin
propagate=0

[logger_group]
level=INFO
handlers=console,file_app
qualname=group
propagate=0

[logger_chat]
level=INFO
handlers=console,file_app
qualname=chat
propagate=0

[logger_streaming]
level=INFO
handlers=console,file_app
qualname=streaming
propagate=0

# ==================== HANDLERS ====================

[handler_console]
class=StreamHandler
level=DEBUG
formatter=default
args=(sys.stdout,)

[handler_file_app]
class=FileHandler
level=DEBUG
formatter=detailed
args=('logs/app.log', 'a')

[handler_file_error]
class=FileHandler
level=ERROR
formatter=detailed
args=('logs/error.log', 'a')

[handler_file_access]
class=FileHandler
level=INFO
formatter=access
args=('logs/access.log', 'a')

[handler_file_database]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/database.log', 'a')

[handler_file_api]
class=FileHandler
level=INFO
formatter=json
args=('logs/api.log', 'a')

[handler_file_websocket]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/websocket.log', 'a')

[handler_file_voice]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/voice.log', 'a')

[handler_file_payment]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/payment.log', 'a')

[handler_file_auth]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/auth.log', 'a')

[handler_file_security]
class=FileHandler
level=WARNING
formatter=detailed
args=('logs/security.log', 'a')

[handler_file_admin]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/admin.log', 'a')

[handler_rotating_app]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailed
args=('logs/app.log', 'a', 10485760, 10)

[handler_rotating_error]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailed
args=('logs/error.log', 'a', 10485760, 10)

[handler_rotating_access]
class=handlers.RotatingFileHandler
level=INFO
formatter=access
args=('logs/access.log', 'a', 10485760, 10)

[handler_sentry]
class=handlers.SentryHandler
level=ERROR
formatter=default
args=()

# ==================== FORMATTERS ====================

[formatter_default]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(funcName)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(name)s %(levelname)s %(filename)s %(lineno)d %(funcName)s %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_simple]
format=%(levelname)s: %(message)s

[formatter_access]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_custom]
format=[%(asctime)s] [%(levelname)s] [%(name)s] %(message)s
datefmt=%H:%M:%S
