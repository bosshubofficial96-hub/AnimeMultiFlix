# AnimeMultiFlix - Production Deployment Workflow
# Version: 4.0.0 (2026)

name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string

env:
  ENVIRONMENT: production
  DOMAIN: animemultiflix.me

jobs:
  # ==================== PRE-DEPLOYMENT CHECKS ====================
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Full Test Suite
        run: |
          npm run test:full
      
      - name: Run Security Scan
        run: |
          npm run security:scan
      
      - name: Run Performance Benchmark
        run: |
          npm run benchmark
      
      - name: Check Database Connectivity
        run: |
          npm run db:check
      
      - name: Check CDN Status
        run: |
          curl -f https://cdn.animemultiflix.me/health || exit 1
      
      - name: Check Backup Status
        run: |
          npm run backup:verify

  # ==================== CANARY DEPLOYMENT ====================
  canary-deploy:
    name: Canary Deployment (10%)
    runs-on: ubuntu-latest
    needs: pre-deploy
    timeout-minutes: 20
    
    steps:
      - name: Deploy Canary
        run: |
          kubectl set image deployment/animemultiflix-node canary=${{ env.ECR_REGISTRY }}/animemultiflix-node:${{ github.event.release.tag_name }} -n production
          kubectl scale deployment/animemultiflix-node-canary --replicas=1 -n production
      
      - name: Monitor Canary (15 minutes)
        run: |
          sleep 900
          ERROR_RATE=$(kubectl logs deployment/animemultiflix-node-canary -n production --tail=100 | grep ERROR | wc -l)
          if [ $ERROR_RATE -gt 5 ]; then
            echo "Canary deployment failed - too many errors"
            kubectl scale deployment/animemultiflix-node-canary --replicas=0 -n production
            exit 1
          fi

  # ==================== FULL DEPLOYMENT ====================
  full-deploy:
    name: Full Deployment
    runs-on: ubuntu-latest
    needs: canary-deploy
    timeout-minutes: 30
    
    steps:
      - name: Blue-Green Deployment
        run: |
          # Switch traffic to green environment
          kubectl patch service animemultiflix-node -n production -p '{"spec":{"selector":{"version":"green"}}}'
          # Wait for traffic to shift
          sleep 60
          # Scale down blue environment
          kubectl scale deployment/animemultiflix-node-blue --replicas=0 -n production
      
      - name: Verify Production
        run: |
          sleep 30
          curl -f https://animemultiflix.me/health || exit 1
          curl -f https://animemultiflix.me/api/v1/status || exit 1
      
      - name: Run Production Smoke Tests
        run: |
          cd tests/smoke
          npm run test:production
      
      - name: Send Production Deployment Notification
        uses: slackapi/slack-github-action@v1.24
        with:
          payload: |
            {
              "text": "🎉 Production deployment successful!\nVersion: ${{ github.event.release.tag_name }}\nURL: https://animemultiflix.me\nDeployment Time: $(date)\nStatus: All systems operational"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PRODUCTION_WEBHOOK }}
