# AnimeMultiFlix - Comprehensive Testing Workflow
# Version: 4.0.0 (2026)

name: Test Suite

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  # ==================== UNIT TESTS ====================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        service: [node, python, go, rust]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        if: matrix.service == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json
      
      - name: Setup Python
        if: matrix.service == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-python/requirements.txt
      
      - name: Setup Go
        if: matrix.service == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      
      - name: Setup Rust
        if: matrix.service == 'rust'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: '1.75'
      
      - name: Install Dependencies
        if: matrix.service == 'node'
        run: |
          cd backend-node
          npm ci
      
      - name: Install Python Dependencies
        if: matrix.service == 'python'
        run: |
          cd backend-python
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Install Go Dependencies
        if: matrix.service == 'go'
        run: |
          cd backend-go
          go mod download
      
      - name: Run Node Unit Tests
        if: matrix.service == 'node'
        run: |
          cd backend-node
          npm run test:unit
          npm run test:coverage
      
      - name: Run Python Unit Tests
        if: matrix.service == 'python'
        run: |
          cd backend-python
          pytest tests/unit -v --cov=. --cov-report=html
      
      - name: Run Go Unit Tests
        if: matrix.service == 'go'
        run: |
          cd backend-go
          go test -v -coverprofile=coverage.out ./internal/...
      
      - name: Run Rust Unit Tests
        if: matrix.service == 'rust'
        run: |
          cd backend-rust
          cargo test --lib --verbose
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend-node/coverage/lcov.info,./backend-python/coverage.xml,./backend-go/coverage.out
          flags: ${{ matrix.service }}-unit

  # ==================== INTEGRATION TESTS ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: animemultiflix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd backend-node
          npm ci
      
      - name: Run Integration Tests
        run: |
          cd backend-node
          npm run test:integration
        env:
          MONGODB_URI: mongodb://localhost:27017/animemultiflix_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: test123
          PG_DATABASE: animemultiflix_test
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
      
      - name: Upload Integration Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: backend-node/logs/

  # ==================== END-TO-END TESTS ====================
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: integration-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json
      
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      
      - name: Install Dependencies
        run: |
          cd backend-node
          npm ci
          cd ../frontend
          npm ci
      
      - name: Start Application
        run: |
          cd backend-node
          npm run start:test &
          cd ../frontend
          npm run dev &
          sleep 30
      
      - name: Run E2E Tests
        run: |
          cd frontend
          npm run test:e2e
      
      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: frontend/test-results/

  # ==================== PERFORMANCE TESTS ====================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, integration-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install Dependencies
        run: |
          cd backend-node
          npm ci
      
      - name: Start Application for Performance Testing
        run: |
          cd backend-node
          npm run start:test &
          sleep 30
      
      - name: Run Load Tests
        run: |
          cd tests/load
          k6 run --out json=results.json stress-test.js
      
      - name: Run Soak Tests
        run: |
          cd tests/load
          k6 run --out json=soak-results.json soak-test.js
      
      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: tests/load/*.json

  # ==================== SECURITY TESTS ====================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
      
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'AnimeMultiFlix'
          path: '.'
          format: 'HTML'
          out: 'reports'
      
      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            reports/

  # ==================== FINAL STATUS ====================
  test-status:
    name: Test Status
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, security-tests]
    if: always()
    
    steps:
      - name: Check All Tests Passed
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed!"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "Integration tests failed!"
            exit 1
          fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "E2E tests failed!"
            exit 1
          fi
          if [ "${{ needs.performance-tests.result }}" != "success" ]; then
            echo "Performance tests failed!"
            exit 1
          fi
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "Security tests failed!"
            exit 1
          fi
          echo "✅ All tests passed!"
      
      - name: Send Test Summary to Slack
        uses: slackapi/slack-github-action@v1.24
        with:
          payload: |
            {
              "text": "📊 AnimeMultiFlix Test Results\nUnit: ${{ needs.unit-tests.result }}\nIntegration: ${{ needs.integration-tests.result }}\nE2E: ${{ needs.e2e-tests.result }}\nPerformance: ${{ needs.performance-tests.result }}\nSecurity: ${{ needs.security-tests.result }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
