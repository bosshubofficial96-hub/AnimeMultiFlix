# AnimeMultiFlix - Staging Deployment Workflow
# Version: 4.0.0 (2026)

name: Deploy to Staging

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

env:
  ENVIRONMENT: staging
  DOMAIN: staging.animemultiflix.me

jobs:
  # ==================== BUILD STAGING ====================
  build-staging:
    name: Build Staging Images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    strategy:
      matrix:
        service: [node, python, go, rust]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Staging Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-${{ matrix.service }}
          file: ./docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:staging-${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:staging-latest
          build-args: |
            NODE_ENV=staging
            BUILD_VERSION=${{ github.sha }}
      
      - name: Deploy to Staging Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
          kubectl set image deployment/animemultiflix-${{ matrix.service }} ${{ matrix.service }}=ghcr.io/${{ github.repository }}/${{ matrix.service }}:staging-${{ github.sha }} -n staging
          kubectl rollout status deployment/animemultiflix-${{ matrix.service }} -n staging --timeout=5m
      
      - name: Staging Health Check
        run: |
          sleep 30
          curl -f https://staging.animemultiflix.me/health || exit 1
      
      - name: Run E2E Tests on Staging
        run: |
          cd frontend
          npm ci
          npm run test:e2e:staging
      
      - name: Send Staging Deployment Status
        uses: slackapi/slack-github-action@v1.24
        with:
          payload: |
            {
              "text": "🟢 Staging deployment completed!\nEnvironment: Staging\nURL: https://staging.animemultiflix.me\nCommit: ${{ github.sha }}\nServices: ${{ matrix.service }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_STAGING_WEBHOOK }}
